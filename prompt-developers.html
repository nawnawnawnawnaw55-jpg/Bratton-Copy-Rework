  window.FinsweetConsentPro = window.FinsweetConsentPro || [];

      console.log('Consent Pro loaded:', FinsweetConsentPro.version);

      const choices = FinsweetConsentPro.consents.get();
      console.log('Current choices:', choices);

      try {
        const SESSION_KEY = 'cp_visited';
        const INTERACTED_KEY = 'cp_user_interacted';
        
        const isFirstPageThisSession = !sessionStorage.getItem(SESSION_KEY);
        const userHasInteracted = sessionStorage.getItem(INTERACTED_KEY) === '1';
        
        sessionStorage.setItem(SESSION_KEY, '1');
        
        // Listen for any future consent changes and mark as interacted
        FinsweetConsentPro.on('consent-updated', (detail) => {
          console.log("consent detail: ", detail);
          console.log("consent source: ", detail.source);
          // Only mark as user-interacted if it came from a user action,
          // not from our own auto-accept call
          if (detail && detail.source !== 'auto-accept-script') {
            console.log('User interacted with consent — locking out auto-accept');
            sessionStorage.setItem(INTERACTED_KEY, '1');
          }
        });
        
        if (isFirstPageThisSession) {
          console.log('First page of session — letting banner show, no auto-accept');
          return;
        }
        
        if (userHasInteracted) {
          console.log('User has interacted with consent UI — respecting their choice');
          return;
        }
        
        const hasAnyConsent = choices.analytics === true 
                           || choices.marketing === true 
                           || choices.personalization === true;
        
        if (hasAnyConsent) {
          console.log('User has consent — not overriding');
          return;
        }
        
        console.log('Subsequent page, no interaction, no consent — auto-accepting');
        FinsweetConsentPro.consents.acceptAll();
        
      } catch (e) {
        console.error('Consent auto-accept error:', e);
      }
    },
  ]);

      window.FinsweetConsentPro.elements.banner.hide();
    });
  }

<script>
  const searchTrigger = $('[data-search-trigger]');
  const searchTarget = $('[data-search-target]');
  const menuItems = $('.main-nav_menu-left');
  const menuItemsV2 = $('.mega-nav__bar-list.is-left');
  const searchCloseBtn = $('[data-search-close]');

  searchTrigger.on('click', function () {
    let currentSearchState = searchTarget.attr('data-search-state');

    if (currentSearchState === 'closed') {
      openSearch();
    } else {
      closeSearch();
    }
  });

  searchCloseBtn.on('click', function () {
    if (searchTarget.attr('data-search-state') === 'open') {
      closeSearch();
    }
  });

  $(document).on('keydown', function (event) {
    if (event.key === 'Escape') {
      if (searchTarget.attr('data-search-state') === 'open') {
        closeSearch();
      }
    }
  });

  $(document).on('click', function (event) {
    if (!$(event.target).closest(searchTarget).length && !$(event.target).closest(searchTrigger).length) {
      if (searchTarget.attr('data-search-state') === 'open') {
        closeSearch();
      }
    }
  });

  function openSearch() {
    searchTarget.addClass('is-active');
    searchTarget.attr('data-search-state', 'open');
    menuItems.addClass('is-inactive');
    menuItemsV2.addClass('is-inactive');
  }

  function closeSearch() {
    searchTarget.removeClass('is-active');
    searchTarget.attr('data-search-state', 'closed');
    menuItems.removeClass('is-inactive');
    menuItemsV2.removeClass('is-inactive');
  }
</script>
